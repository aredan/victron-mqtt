views:
  - path: default_view
    title: Home
    cards:
      - square: true
        type: grid
        columns: 4
        cards:
          - show_state: true
            show_name: false
            camera_view: auto
            type: picture-entity
            entity: person.ariel
            aspect_ratio: '1'
            image: /api/image/serve/5e3f3671f1855327dca0c1853ca88203/512x512
          - show_state: true
            show_name: false
            camera_view: auto
            type: picture-entity
            entity: person.angela
            aspect_ratio: '1'
            image: /api/image/serve/0ee3cbedf29626bf8abfe3bd0400f124/512x512
          - show_state: true
            show_name: false
            camera_view: auto
            type: picture-entity
            entity: person.gabriela_antigua
            aspect_ratio: '1'
            name: Gabriela
            image: /api/image/serve/46590573b6676f626a828c2e3d88fb24/512x512
          - show_state: true
            show_name: false
            camera_view: auto
            type: picture-entity
            entity: person.abigail_antigua
            aspect_ratio: '1'
            name: Abigail
            image: /api/image/serve/9b69e2768e49282ec66ac6c4097e0776/512x512
      - square: true
        type: grid
        cards:
          - square: false
            type: grid
            cards:
              - type: gauge
                entity: sensor.ccm_alameda_op_temperature
                name: Temp
                unit: C
            columns: 1
          - type: entity
            entity: sun.sun
            state_color: true
          - show_current: true
            show_forecast: false
            type: weather-forecast
            entity: weather.forecast_home
            forecast_type: hourly
      - square: false
        type: grid
        cards:
          - type: custom:button-card
            name: EDESUR
            entity: sensor.grid_status
            icon: mdi:transmission-tower
            state:
              - value: UP
                color: rgb(0, 100, 0)
              - value: Fault
                color: rgb(255, 0, 0)
          - type: custom:button-card
            name: Solar
            entity: sensor.victron_mppt_state
            icon: mdi:solar-power-variant
            state:
              - value: External control
                color: rgb(255, 255, 0)
              - value: 'Off'
                color: rgb(169, 169, 169)
              - value: LIMITED
                color: rgb(0, 0, 255)
          - type: custom:button-card
            name: Office Light
            entity: light.office_light
            icon: mdi:lightbulb
            state:
              - value: 'ON'
                color: rgb(255, 255, 0)
              - value: 'OFF'
                color: rgb(169, 169, 169)
          - type: custom:button-card
            name: MediaRoom Light
            entity: light.mediaroom_light
            icon: mdi:lightbulb
            state:
              - value: 'ON'
                color: rgb(255, 255, 0)
              - value: 'OFF'
                color: rgb(128, 128, 128)
    icon: mdi:home
  - title: ESS
    icon: mdi:transmission-tower
    cards: []
    visible:
      - user: 57db3acfa47343fe95abb348213cdbc8
      - user: 3ea71e7f83c2432396822be60af5e7c2
    type: sections
    sections:
      - type: grid
        cards:
          - type: heading
            icon: mdi:current-ac
            heading: AC Energy
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.inverter_output_load_on_l1
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.inverter_output_load_on_l2
          - type: tile
            entity: sensor.grid_load_on_l1
            features_position: bottom
            vertical: false
            name: Grid In L1
            color: green
          - type: tile
            entity: sensor.grid_load_on_l2
            features_position: bottom
            vertical: false
            name: Grid In L2
            color: green
          - type: tile
            entity: sensor.ac_consumption_l1
            name: AC Consumption L1
            color: light-green
            vertical: false
            features_position: bottom
          - type: tile
            entity: sensor.ac_consumption_l2
            name: AC Consumption L2
            color: light-green
            vertical: false
            features_position: bottom
          - type: tile
            entity: sensor.grid_voltage_l1
            features_position: bottom
            vertical: false
            name: Grid Voltage L1
          - type: tile
            entity: sensor.grid_voltage_l2
            features_position: bottom
            vertical: false
            name: Grid Voltage L2
          - type: tile
            entity: sensor.grid_current_limit
            features_position: bottom
            vertical: false
            name: Grid limit
            icon: mdi:car-speed-limiter
          - type: tile
            entity: sensor.ess_battery_set_limit
            features_position: bottom
            vertical: false
            name: ESS battery limit
          - type: tile
            entity: sensor.grid_energy_from
            features_position: bottom
            vertical: false
            name: Grid Energy In
          - type: tile
            entity: sensor.grid_energy_to
            features_position: bottom
            vertical: false
            name: Grid Energy Out
          - type: tile
            entity: sensor.grid_frequency_l1
            features_position: bottom
            vertical: false
            name: Grid Freq L1
          - type: tile
            entity: sensor.grid_frequency_l2
            features_position: bottom
            vertical: false
            name: Grid Freq L2
          - square: false
            type: grid
            cards:
              - type: custom:button-card
                name: Solar
                entity: sensor.victron_mppt_state
                icon: mdi:solar-power-variant
                state:
                  - value: External control
                    color: rgb(255, 255, 0)
                  - value: 'Off'
                    color: rgb(169, 169, 169)
                  - value: LIMITED
                    color: rgb(0, 0, 255)
                size: 20%
            grid_options:
              columns: 4
              rows: 1
            columns: 1
          - square: false
            type: grid
            cards:
              - type: custom:button-card
                name: Battery
                entity: sensor.victron_system_battery_state
                icon: mdi:battery
                state:
                  - value: DISCHARGING
                    color: rgb(255, 0, 0)
                  - value: CHARGING
                    color: rgb(0, 100, 0)
                  - value: IDLE
                    color: rgb(0, 0, 255)
                size: 20%
            grid_options:
              columns: 4
              rows: 1
            columns: 1
          - square: true
            type: grid
            cards:
              - type: custom:button-card
                name: EDESUR
                entity: sensor.grid_status
                icon: mdi:transmission-tower
                state:
                  - value: UP
                    color: rgb(0, 100, 0)
                  - value: Fault
                    color: rgb(255, 0, 0)
                size: 20%
            grid_options:
              columns: 4
              rows: 1
            columns: 1
          - type: tile
            entity: sensor.ess_state
            features_position: bottom
            vertical: false
            grid_options:
              columns: 6
              rows: 1
          - type: tile
            entity: sensor.inverter_state
            features_position: bottom
            vertical: false
            grid_options:
              columns: 6
              rows: 1
            icon: mdi:generator-stationary
            color: green
          - type: custom:system-flow-card
            speed: 3
            fadeIdylElements: true
            system:
              unit: W
              icon: mdi:home-battery-outline
              extra:
                main: sensor.inverter_state
              color: '#0089b6'
            elements:
              - value: sensor.grid_load_on_l1
                icon: mdi:transmission-tower-import
                position: left
                color: '#B62D00'
                extra:
                  main: sensor.grid_load_on_l2
                  left: sensor.grid_voltage_l1
                  right: sensor.grid_voltage_l2
              - value: sensor.battery_power
                invert: true
                icon: mdi:battery
                extra:
                  main: sensor.shunt_state_of_charge
                  left: sensor.battery_voltage
                  right: sensor.battery_current
                fill: sensor.shunt_state_of_charge
                position: left
                color: '#3FF628'
              - value: sensor.day_generation
                icon: mdi:solar-power-variant
                extra:
                  main: sensor.pv_power
                  left: sensor.pv_voltage
                  right: sensor.pv_current
                position: top
                color: '#F6DF28'
                fill: sensor.day_generation
              - value: sensor.ac_consumption_l1
                icon: mdi:power-plug
                position: right
                color: '#B62D00'
                invert: true
                extra:
                  main: sensor.ac_consumption_l2
                  left: sensor.inverter_output_load_on_l1
                  right: sensor.inverter_output_load_on_l2
      - type: grid
        cards:
          - type: heading
            icon: mdi:battery
            heading: Battery
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.shunt_state_of_charge
              - type: entity
                show_state: true
                show_icon: true
