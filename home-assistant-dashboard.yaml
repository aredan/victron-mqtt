          - type: tile
            entity: sensor.shunt_voltage
            features_position: bottom
            vertical: false
            name: Shunt Voltage
          - type: tile
            entity: sensor.battery_voltage
            features_position: bottom
            vertical: false
            name: Weco Voltage
          - type: tile
            entity: sensor.cell_low_voltage
            features_position: bottom
            vertical: false
