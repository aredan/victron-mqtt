          - type: tile
            entity: sensor.dc_system_power
            features_position: bottom
            vertical: false
            name: DC System Power
      - type: grid
        cards:
          - type: heading
            heading: Solar
            heading_style: title
            icon: mdi:solar-power
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.pv_power
          - type: tile
            entity: sensor.victron_mppt_state
            features_position: bottom
            vertical: false
            name: MPPT01 State
            icon: mdi:solar-power-variant
            color: accent
            state_content: state
          - type: tile
            entity: sensor.pv_current
            features_position: bottom
            vertical: false
